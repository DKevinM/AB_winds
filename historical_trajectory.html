<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Odour Index — Back Trajectory Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="odour/data.js"></script>

  <style>
    body { margin: 0; font-family: Arial; background: #111; color: #eee; }
    #map { height: 80vh; }
    #panel {
      padding: 10px;
      background: #1b1b1b;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input, button {
      padding: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="panel">
  <b>Odour Index</b>
  Time (local - Alberta, auto-converted to UTC):
  <input id="time" type="datetime-local">
  Hours:
  <input id="hours" type="number" value="4" min="1" max="12">
  <span style="font-size:12px; color:#aaa;">
    Alberta time; the model converts it to UTC
  </span>  
  <button onclick="runModel()">Run Odour Model</button>
  <span id="status"></span>
</div>

<div id="map"></div>

<script>

let selectedPoint = null;
let trajectoryPoll = null;
let modelStartTime = null;

// MAP SETUP
const map = L.map('map').setView([53.54, -113.49], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);



// LAYERS
const stationsLayer = L.layerGroup().addTo(map);
const purpleLayer = L.layerGroup().addTo(map);
const npriLayer = L.layerGroup().addTo(map);
  
const centerlineLayer = L.layerGroup().addTo(map);
const cloudLayer = L.layerGroup().addTo(map);
const densityLayer = L.layerGroup().addTo(map);

const overlayMaps = {
  "Stations": stationsLayer,
  "PurpleAir": purpleLayer,
  "NPRI": npriLayer,
  "Back Trajectory Centerlines": centerlineLayer,
  "Back Trajectory Cloud": cloudLayer,
  "Back Trajectory Density": densityLayer
};

L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);


  
  
function getColor(aqhi) {
  const lut = {
    "1":  "#01cbff",
    "2":  "#0099cb",
    "3":  "#016797",
    "4":  "#fffe03",
    "5":  "#ffcb00",
    "6":  "#ff9835",
    "7":  "#fd6866",
    "8":  "#fe0002",
    "9":  "#cc0001",
    "10": "#9a0100",
    "10+": "#640100"
  };
  return lut[String(aqhi)] || "#D3D3D3";
}  

  
// =============================
// STATIONS (GeoJSON)
// =============================
window.dataReady
  .then(() => fetchAllStationData())
  .then(allStations => {
    allStations.forEach(({ stationName, lat, lon, html, aqhi }) => {
      const fillColor = getColor(String(aqhi || "NA"));

      const popupContent = html || `
        <b>${stationName || "Station"}</b><br>
        AQHI: ${aqhi ?? "NA"}<br>
        <hr>
        <a href="https://dkevinm.github.io/AB_datapull/web/station_compare.html?station=${encodeURIComponent(stationName)}"
           target="_blank">
           View historical data
        </a>
      `;

      const marker = L.circleMarker([lat, lon], {
        radius: 7,
        fillColor: fillColor,
        color: "#222",
        weight: 1,
        fillOpacity: 0.85
      });

      marker.bindPopup(popupContent);
      marker.addTo(stationsLayer);
    });
  })
  .catch(err => console.error("Stations load failed", err));



// =============================
// PURPLEAIR
// =============================
fetch("https://DKevinM.github.io/AB_datapull/data/AB_PM25_map.json")
  .then(r => r.json())
  .then(data => {
    data.forEach(s => {
      const lat = parseFloat(s.latitude ?? s.lat);
      const lon = parseFloat(s.longitude ?? s.lon);
      if (!isFinite(lat) || !isFinite(lon)) return;

      const sensorIndex = s.sensor_index ?? "NA";
      const label = s.name ?? s.sensor_index ?? "PurpleAir Sensor";

      const marker = L.circleMarker([lat, lon], {
        radius: 4,
        color: "#8000ff",
        fillOpacity: 0.6
      });

      marker.bindPopup(`
        <strong>PurpleAir</strong><br>
        <b>${label}</b><br>
        Sensor index: ${sensorIndex}<br>
        <hr>
        <a href="https://dkevinm.github.io/AB_datapull/web/sensor_compare.html?sensor_index=${sensorIndex}"
           target="_blank">
           View historical PM2.5
        </a>
      `);

      marker.addTo(purpleLayer);
    });
  })
  .catch(err => console.error("PurpleAir load failed", err));

  
// =============================
// NPRI
// =============================
fetch("https://raw.githubusercontent.com/DKevinM/NextGen_dk/main/data/NPRI.geojson")
  .then(r => r.json())
  .then(fc => {
    L.geoJSON(fc, {
      pointToLayer: (f, latlng) => {
        const marker = L.circleMarker(latlng, {
          radius: 4,
          color: "#ff0000",
          fillOpacity: 0.7
        });

        const facilityName =
          f.properties?.FACILITY_NAME ||
          f.properties?.FacilityName ||
          f.properties?.CompanyName ||
          "NPRI Facility";

        const companyName =
          f.properties?.COMPANY_NAME ||
          f.properties?.Company ||
          "";

        const yr =
          f.properties?.REPORTING_YEAR ||
          f.properties?.ReportingYear ||
          "";

        const popupLabel = companyName
          ? `${facilityName} (${companyName})`
          : facilityName;

        marker.bindPopup(`
          <b>${popupLabel}</b><br>
          ${yr ? `Year: ${yr}<br>` : ""}
          <small>${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}</small>
        `);

        return marker;
      }
    }).addTo(npriLayer);
  })
  .catch(err => console.error("NPRI load failed", err));




  


  
// CLICK LOCATION
let marker;
map.on('click', e => {
  selectedPoint = e.latlng;
  if (marker) map.removeLayer(marker);
  marker = L.marker(e.latlng).addTo(map);
});

// ----------------------------
// CHECK FOR NEW OUTPUT
// ----------------------------
async function checkForNewOutput() {
  try {
    const res = await fetch(
      "odour_data/backtraj_centerlines.geojson?t=" + Date.now(),
      { method: "HEAD" }
    );

    if (!res.ok) return false;

    const lastModified = res.headers.get("Last-Modified");
    if (!lastModified) return false;

    const fileTime = new Date(lastModified).getTime();

    return fileTime > modelStartTime;

  } catch {
    return false;
  }
}

// ----------------------------
// LOAD TRAJECTORIES
// ----------------------------
async function loadTrajectories() {

  const [centerRes, cloudRes, densityRes] = await Promise.all([
    fetch("odour_data/backtraj_centerlines.geojson?t=" + Date.now()),
    fetch("odour_data/backtraj_cloud.geojson?t=" + Date.now()),
    fetch("odour_data/backtraj_density.geojson?t=" + Date.now())
  ]);

  if (!centerRes.ok || !cloudRes.ok || !densityRes.ok) return false;

  const centerGeo = await centerRes.json();
  const cloudGeo = await cloudRes.json();
  const densityGeo = await densityRes.json();

  centerlineLayer.clearLayers();
  cloudLayer.clearLayers();
  densityLayer.clearLayers();

  // CENTERLINE
  L.geoJSON(centerGeo, {
    style: { color: "#00ffff", weight: 2 },
    onEachFeature: (feature, layer) => {
      const z0 = feature.properties?.z0_m ?? "NA";
      layer.bindTooltip(`Back trajectory<br>Start height: ${z0} m`, {
        sticky: true
      });
    }
  }).addTo(centerlineLayer);

  // CLOUD
  L.geoJSON(cloudGeo, {
    pointToLayer: (f, latlng) =>
      L.circleMarker(latlng, {
        radius: 3,
        fillColor: "#7fcdbb",
        color: "#111",
        weight: 0.5,
        fillOpacity: 0.6
      }),
    onEachFeature: (feature, layer) => {
      const t = feature.properties?.t ?? "NA";
      const z = feature.properties?.z_m ?? "NA";
      layer.bindTooltip(`Particle<br>Time: ${t}<br>Height: ${z} m`, {
        sticky: true
      });
    }
  }).addTo(cloudLayer);

  // DENSITY
  L.geoJSON(densityGeo, {
    style: f => ({
      color: "#333",
      weight: 0.3,
      fillColor: "#ff7f00",
      fillOpacity: Math.min(0.6, (f.properties.count || 0) / 50)
    }),
    onEachFeature: (feature, layer) => {
      const count = feature.properties?.count ?? 0;
      layer.bindTooltip(`Trajectory density<br>Count: ${count}`, {
        sticky: true
      });
    }
  }).addTo(densityLayer);

  return true;
}

// ----------------------------
// START POLLING
// ----------------------------
function startPolling() {

  if (trajectoryPoll) clearInterval(trajectoryPoll);

  document.getElementById("status").innerText =
    "Model running — checking for results every 2 minutes...";

  trajectoryPoll = setInterval(async () => {

    const ready = await checkForNewOutput();

    if (ready) {
      clearInterval(trajectoryPoll);

      await loadTrajectories();

      document.getElementById("status").innerText =
        "Trajectory loaded";
    }

  }, 120000);
}

// ----------------------------
// RUN MODEL (KEY FUNCTION)
// ----------------------------
async function runModel() {

  if (!selectedPoint) {
    alert("Click on the map first.");
    return;
  }

  const time = document.getElementById("time").value;
  console.log("Local Alberta time sent to model:", time);
  const hours = document.getElementById("hours").value;

  if (!time) {
    alert("Enter a local time");
    return;
  }

  modelStartTime = Date.now();

  document.getElementById("status").innerText =
    "Triggering Python model...";

const res = await fetch(
  "https://dawn-dew-c0e8.kevinmcc.workers.dev/",
  {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      lat: selectedPoint.lat,
      lon: selectedPoint.lng,
      time_local: time,
      timezone: "America/Edmonton",
      hours: Number(hours)
    })
  }
);

const txt = await res.text();
console.log("API RESPONSE:", txt);

document.getElementById("status").innerText =
  "Response: " + txt;

startPolling();
}

</script>

</body>
</html>
