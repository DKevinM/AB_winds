<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AB Wind (Leaflet)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }
    .info {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font: 14px/1.3 Arial, sans-serif;
      padding: 8px 10px;
      border-radius: 6px;
      max-width: 360px;
    }
    canvas.wind {
      position: absolute;
      top: 0;
      left: 0;
      transform: none !important;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info" id="info">Loading wind…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="js/wind_fetch.js"></script>



  <script>
    let field = null;
    let windTime = {
      baseUTC: null,
      i: 0,
      a: 0
    };    


    // If your grid is Alberta-only, set a reasonable start view:
    const map = L.map("map", { zoomControl: true }).setView([55, -115], 6);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);


    function getDataAgeText(modelTimeISO) {
      if (!modelTimeISO) return "Data age: unknown";
    
      const modelTime = Date.parse(modelTimeISO);
      const nowUTC = Date.now();
    
      const diffMs = nowUTC - modelTime;
    
      const diffMin = Math.floor(diffMs / 60000);
      const hours = Math.floor(diffMin / 60);
      const minutes = diffMin % 60;
    
      if (hours > 0) {
        return `Data age: ${hours}h ${minutes}m`;
      } else {
        return `Data age: ${minutes}m`;
      }
    }


    function getEffectiveWindTime() {
      if (!windTime.baseUTC) return null;
      return new Date(
        windTime.baseUTC.getTime() + (windTime.i + windTime.a) * 3600_000
      );
    }

    
    function getWindTimeDiagnostics() {
      if (!field || !windTime.baseUTC) return "Wind time: unknown";
    
      const modelUTC = new Date(windTime.baseUTC).toUTCString();
      const effectiveTime = getEffectiveWindTime();
      const nowUTC = new Date();
    
      const ageMs = nowUTC - effectiveTime;
      const ageMin = Math.floor(ageMs / 60000);
      const h = Math.floor(ageMin / 60);
      const m = ageMin % 60;
    
      const ageText = h > 0 ? `${h}h ${m}m` : `${m}m`;
    
      return `
    Model cycle: ${modelUTC}<br>
    Effective wind time: ${effectiveTime.toUTCString()
        }`;
    // Current time: ${nowUTC.toUTCString()}<br>
    // <b>Data age: ${ageText}</b>
    }
    
    
    const overlays = {};   // for layer control

    
    function loadOutlineLayer(url, color, name) {
      return fetch(url)
        .then(r => r.json())
        .then(geo => {
          const layer = L.geoJSON(geo, {
            style: {
              color: color,
              weight: 4,
              opacity: 1,
              fillOpacity: 0,
              dashArray: "6 3"
            }
          });
    
          overlays[name] = layer;
          layer.addTo(map);
        });
    }
    
    // Load ACA and WCAS
    Promise.all([
      loadOutlineLayer("data/ACA.geojson", "#ffcc00", "ACA Airshed"),
      loadOutlineLayer("data/WCAS.geojson", "#00ffff", "WCAS Airshed")
    ]).then(() => {
      L.control.layers(null, overlays, { collapsed: false }).addTo(map);
    });


    

    // ---------- Minimal wind particle canvas layer ----------
    const WindLayer = L.Layer.extend({
      onAdd: function(map) {
        this._map = map;
        this._canvas = L.DomUtil.create("canvas", "wind");
        this._canvas.classList.add("wind");
        this._ctx = this._canvas.getContext("2d");
        this._canvas.width = window.innerWidth;
        this._canvas.height = window.innerHeight;
        
       
        console.log("CANVAS ADDED", this._canvas);
        
        map.getPanes().overlayPane.appendChild(this._canvas);

        map.on("move zoom resize", this._reset, this);
        map.on("moveend zoomend resize", this._updateMaskPath, this);
        
        this._reset();
      },

      
      _onZoomStart: function() {
        if (!this._ctx) return;
        this._ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
      
      },
    
      onRemove: function(map) {
        map.off("move zoom resize", this._reset, this);
        if (this._anim) cancelAnimationFrame(this._anim);
        this._canvas.remove();
      },
    
      setField: function(field) {
        this._field = field;
        this._initParticles();
        this._start();
      },
      
      updateField: function(field) {
        this._field = field;
      },
      

      _reset: function () {
        const size = this._map.getSize();
      
        // This is the missing anchor that fixes everything
        this._topLeft = this._map.containerPointToLayerPoint([0, 0]);
      
        L.DomUtil.setPosition(this._canvas, this._topLeft);
      
        this._canvas.width = size.x;
        this._canvas.height = size.y;

        
        const ctx = this._ctx;
        const w = this._canvas.width;
        const h = this._canvas.height;
        
        // HARD CLEAR (debug mode)
        ctx.globalCompositeOperation = "source-over";
        ctx.clearRect(0, 0, w, h);

        
        if (this._field) this._initParticles();
        if (this._maskGeoJSON) this._updateMaskPath();
      },


      setMask: function(geojson) {
        this._maskGeoJSON = geojson;
        this._updateMaskPath();
      },
      
      _updateMaskPath: function() {
        if (!this._maskGeoJSON || !this._topLeft) return;
      
        const path = new Path2D();
      
        const addRing = (ring) => {
          ring.forEach(([lon, lat], i) => {
            const p = this._latLngToCanvasPoint(lat, lon);
            if (i === 0) path.moveTo(p.x, p.y);
            else path.lineTo(p.x, p.y);
          });
          path.closePath();
        };
      
        for (const feat of this._maskGeoJSON.features) {
          const geom = feat.geometry;
          if (!geom) continue;
      
          if (geom.type === "Polygon") {
            geom.coordinates.forEach(addRing);
          } else if (geom.type === "MultiPolygon") {
            geom.coordinates.forEach(poly => poly.forEach(addRing));
          }
        }
      
        this._maskPath = path;
      },

      
      _latLngToCanvasPoint: function (lat, lon) {
        const p = this._map.latLngToLayerPoint([lat, lon]);
        return p.subtract(this._topLeft);
      },
      
      _canvasPointToLatLng: function (x, y) {
        const p = L.point(x, y).add(this._topLeft);
        return this._map.layerPointToLatLng(p);
      },

      
      _initParticles: function() {
        const zoom = this._map.getZoom();
        const width = this._map.getSize().x;
      
        // scale with zoom
        const density = Math.max(0.6, Math.min(2.5, (zoom - 2) / 3));
        const count = Math.round(width * 2.5 * density);
        this._particles = Array.from(
          { length: count },
          () => this._randomParticle()
        );
      },
    
      _randomParticle: function() {
        const f = this._field;
        if (!f) return { lat: 54.5, lon: -114.0, age: 0 };
    
        const lonMin = f.lon0;
        const lonMax = f.lon0 + f.dx * (f.nx - 1);
        const latMax = f.lat0;
        const latMin = f.lat0 - f.dy * (f.ny - 1);
    
        for (let k = 0; k < 60; k++) {
          const lat = latMin + Math.random() * (latMax - latMin);
          const lon = lonMin + Math.random() * (lonMax - lonMin);
    
          const v = f.sample(lat, lon);
          if (!v) continue;

      
              
          const pt = this._latLngToCanvasPoint(lat, lon);
          if (pt.x >= 0 && pt.y >= 0 && pt.x <= this._canvas.width && pt.y <= this._canvas.height) {
            return { lat, lon, age: Math.random() * 200 };
          }
        }
    
        return { lat: 54.5, lon: -114.0, age: 0 };
      },
    
      _start: function() {
        if (this._anim) cancelAnimationFrame(this._anim);
        const frame = () => {
          this._step();
          this._anim = requestAnimationFrame(frame);
        };
        frame();
      },
    
      _step: function () {
        if (!this._field || !this._particles) return;
      
        const ctx = this._ctx;
      
        ctx.save();

        // Fade previous frame 
        ctx.globalCompositeOperation = "destination-in";
        ctx.fillStyle = "rgba(0, 0, 0, 0.60)";
        ctx.fillRect(0, 0, this._canvas.width, this._canvas.height);
        ctx.globalCompositeOperation = "source-over";

        const zoom = this._map.getZoom();
        ctx.lineWidth = Math.max(1.8, Math.min(3.5, zoom * 0.4));
        ctx.beginPath();
      
        for (const p of this._particles) {
          if (p.age++ > 500) {
            Object.assign(p, this._randomParticle());
            continue;
          }
      
          const ll = { lat: p.lat, lon: p.lon };
          const v = this._field.sample(ll.lat, ll.lon);
          
          if (!v || !isFinite(v.u) || !isFinite(v.v)) {
            Object.assign(p, this._randomParticle());
            continue;
          }
          
          const TIME_SCALE = Math.max(1.5, Math.min(5, (zoom - 2) * 0.8));
          
          const dt = 1100 * TIME_SCALE;
          const metersPerDegLat = 111320;
          const metersPerDegLon = 111320 * Math.cos(ll.lat * Math.PI / 180);
          
          const lat2 = ll.lat + (v.v * dt) / metersPerDegLat;
          const lon2 = ll.lon + (v.u * dt) / metersPerDegLon;
          
          // Draw using projection only at render time
          const p1 = this._latLngToCanvasPoint(p.lat, p.lon);
          const p2 = this._latLngToCanvasPoint(lat2, lon2);

          
          const speed = v.speed;
          const intensity = Math.min(255, speed * 25);
          ctx.strokeStyle = `rgba(${intensity}, ${200 - intensity * 0.5}, 255, 1.0)`;
          ctx.lineWidth = Math.max(1.5, Math.min(4, speed * 0.4));
          ctx.shadowColor = ctx.strokeStyle;
          ctx.shadowBlur = v.speed > 6 ? 8 : 3;


          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);

          
          // Update particle in geographic space
          p.lat = lat2;
          p.lon = lon2;
      
          if (!this._field.sample(p.lat, p.lon)) {
            Object.assign(p, this._randomParticle());
          }
        }
      
        ctx.stroke();
        ctx.restore();
      }
    });




   


    const windLayer = new WindLayer();
    windLayer.addTo(map);

    fetch("data/Alberta.geojson")
      .then(r => r.json())
      .then(gj => {
        windLayer.setMask(gj);
        windLayer._updateMaskPath();  
      });
    

    function getCompassArrow(deg) {
      const dirs = ["N","NE","E","SE","S","SW","W","NW"];
      return dirs[Math.round(deg / 45) % 8];
    }
    
    map.on("click", (e) => {
      if (!field) return;
    
      const { lat, lng} = e.latlng;
      const wind = field.sample(lat, lng);
    
      if (!wind) {
        L.popup()
          .setLatLng(e.latlng)
          .setContent("No wind data at this location")
          .openOn(map);
        return;
      }
    
      const dir = (270 - Math.atan2(wind.v, wind.u) * 180 / Math.PI + 360) % 360;
      const speed = wind.speed;
      const arrow = getCompassArrow(dir);
    
      const ageText = getDataAgeText(field.modelTime);

    
      const html = `
        <b>Wind at clicked point</b><br>
        Speed: ${speed.toFixed(2)} m/s<br>
        Direction: ${dir.toFixed(0)}° ${arrow}
      `;
    
      L.popup()
        .setLatLng(e.latlng)
        .setContent(html)
        .openOn(map);
    });


    
    
async function loadWind() {
  const info = document.getElementById("info");
  info.textContent = "Loading wind JSON…";

  const SUPABASE_URL = "https://zcunoncbyitfsilrhymv.supabase.co";
  const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjdW5vbmNieWl0ZnNpbHJoeW12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTE3Mjk3NDYsImV4cCI6MjA2NzMwNTc0Nn0._z_tqm_5UIBkWfMa7HAJrUOA-0t9vOaBVV48-74esWQ";

  const url = `${SUPABASE_URL}/rest/v1/wind_files?select=*&order=valid_time.desc&limit=1`;

  const resMeta = await fetch(url, {
    headers: {
      apikey: API_KEY,
      Authorization: `Bearer ${API_KEY}`
    }
  });

  const rows = await resMeta.json();

  if (!rows || !rows.length) {
    throw new Error("No wind files");
  }

  const filePath = rows[0].file_path;
  console.log("Loading wind file:", filePath);

  const fileURL = `${SUPABASE_URL}/storage/v1/object/public/winds/${filePath}`;
  console.log("Fetching:", fileURL);


  const res = await fetch(fileURL);
  const buffer = await res.arrayBuffer();
  
  const text = pako.inflate(buffer, { to: "string" });
  const data = JSON.parse(text);

  
  console.log("DATA:", data);

  console.log("FIELDS:", data.fields);
  

  
  field = {
    sample: (lat, lon) => {
    
      const grid = data.grid;
    
      const nx = grid.nx;
      const ny = grid.ny;
      const lon0 = grid.lo1;
      const lat0 = grid.la1;
      const dx = grid.dx;
      const dy = grid.dy;
    
      const uData = data.fields.ugrd10[0];
      const vData = data.fields.vgrd10[0];
    
      const fx = (lon - lon0) / dx;
      const fy = (lat0 - lat) / dy;
    
      const i = Math.floor(fx);
      const j = Math.floor(fy);
    
      if (j < 0 || j >= ny || i < 0 || i >= nx) return null;
    
      const u = uData[j][i];
      const v = vData[j][i];
    
      if (!isFinite(u) || !isFinite(v)) return null;
    
      return {
        u,
        v,
        speed: Math.sqrt(u * u + v * v)
      };
    },

    modelTime: data.meta?.run || null,
    lon0: data.grid.lo1,
    lat0: data.grid.la1,
    dx: data.grid.dx,
    dy: data.grid.dy,
    nx: data.grid.nx,
    ny: data.grid.ny
  };

  if (field.modelTime) {
    windTime.baseUTC = new Date(
      field.modelTime.endsWith("Z")
        ? field.modelTime
        : field.modelTime + "Z"
    );
  } else {
    windTime.baseUTC = null;
  }

  const midLat = data.grid.la1 - (data.grid.dy * data.grid.ny / 2);
  const midLon = data.grid.lo1 + (data.grid.dx * data.grid.nx / 2);
  
  const test = field.sample(midLat, midLon);
  console.log("MID GRID TEST:", test);

  
  console.log("GRID BOUNDS:", {
    latMax: data.grid.la1,
    latMin: data.grid.la1 - data.grid.dy * (data.grid.ny - 1),
    lonMin: data.grid.lo1,
    lonMax: data.grid.lo1 + data.grid.dx * (data.grid.nx - 1)
  });
  
  
  info.textContent = "Wind loaded (particles running)";
  return field;
}   








































    
    loadWind().then(f => {
      windLayer.setField(f);
    
      document.getElementById("info").innerHTML = getWindTimeDiagnostics();
    
      setInterval(() => {
        document.getElementById("info").innerHTML = getWindTimeDiagnostics();
      }, 60000);
    });
    
        
  </script>
</body>
</html>
