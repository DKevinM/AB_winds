name: Odour Trigger API

permissions:
  actions: write
  contents: write

on:
  repository_dispatch:
    types: [run_odour_model]

jobs:
  odour:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install numpy xarray cfgrib requests supabase

    - name: Run odour back trajectory model
      env:
        LAT: ${{ github.event.client_payload.lat }}
        LON: ${{ github.event.client_payload.lon }}
        TIME_UTC: ${{ github.event.client_payload.time }}
        HOURS: ${{ github.event.client_payload.hours }}
      run: |
        python odour/backtraj_core.py

    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add odour_data/*.geojson
        git commit -m "Update odour back trajectories" || echo "No changes"
        git push
