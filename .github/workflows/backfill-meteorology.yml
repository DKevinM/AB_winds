name: Alberta Meteorology Backfill

on:
  schedule:
    - cron: "0 6 * * *"   # once per day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill-meteorology:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install xarray cfgrib numpy requests netcdf4 eccodes supabase httpx

      - name: Run backfill (24 hours)
        run: |
          python py/ab_met_pull.py --backfill 24
